name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts:
    name: Smart Contracts (test + build + deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deploy-

      - name: Run contract test suite
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test --workspace --verbose | tail -60

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Stellar CLI
        run: cargo binstall --no-confirm stellar-cli

      - name: Build contracts
        run: |
          cargo build --target wasm32-unknown-unknown --release
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/registry.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/distributor.wasm

      - name: Deploy to Testnet
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          echo "Generating identities..."
          stellar keys generate deployer --network testnet
          stellar keys fund deployer --network testnet

          echo "Deploying Registry Contract..."
          REGISTRY_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/registry.optimized.wasm \
            --source deployer \
            --network testnet 2>deploy_err.log) || { cat deploy_err.log; exit 1; }
          echo "Registry Contract deployed at: $REGISTRY_ID"

          echo "Deploying Distributor Contract..."
          DISTRIBUTOR_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/distributor.optimized.wasm \
            --source deployer \
            --network testnet 2>deploy_err.log) || { cat deploy_err.log; exit 1; }
          echo "Distributor Contract deployed at: $DISTRIBUTOR_ID"
          
          echo "Fetching Test Token (Native XLM asset) ID..."
          TOKEN_ID=$(stellar contract id asset --asset native --network testnet)
          echo "Native Token ID is: $TOKEN_ID"

          echo "Initializing Registry Contract..."
          stellar contract invoke --id $REGISTRY_ID --source deployer --network testnet -- init_registry --admin $(stellar keys address deployer) --distributor_contract $DISTRIBUTOR_ID
          
          echo "Initializing Distributor Contract..."
          stellar contract invoke --id $DISTRIBUTOR_ID --source deployer --network testnet -- init_distributor --admin $(stellar keys address deployer) --registry_contract $REGISTRY_ID

          echo "=================================================="
          echo " Deployment complete"
          echo "=================================================="
          echo " VITE_REGISTRY_CONTRACT_ID: $REGISTRY_ID"
          echo " VITE_DISTRIBUTOR_CONTRACT_ID: $DISTRIBUTOR_ID"
          echo " VITE_TOKEN_CONTRACT_ID: $TOKEN_ID"
          echo "=================================================="

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Run test suite
        run: npm test

      - name: Build production bundle
        run: npm run build
        env:
          VITE_STELLAR_NETWORK: TESTNET
          VITE_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          VITE_NETWORK_PASSPHRASE: 'Test SDF Network ; September 2015'
          VITE_REGISTRY_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          VITE_DISTRIBUTOR_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          VITE_TOKEN_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
